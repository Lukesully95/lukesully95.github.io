/* ---------- Shared state (filled from Firestore) ---------- */
let addedEvents=[];   // {id, d, t, time, loc, cat}
let hiddenBaseIds=[]; // ids of base events removed by someone
let photos=[];        // {id, d, src, cap}

const CAT={work:{bg:'#d2e3fc',txt:'#1a3d8f',b:'#1565c0'},soccer:{bg:'#d4edda',txt:'#1a5c34',b:'#28a745'},school:{bg:'#fff3cd',txt:'#856404',b:'#ffc107'},travel:{bg:'#fce8d5',txt:'#8b3a0f',b:'#fd7e14'},personal:{bg:'#ede0f9',txt:'#5a1a8a',b:'#9c27b0'},holiday:{bg:'#fde8e8',txt:'#991b1b',b:'#dc3545'}};
const MN=['','January','February','March','April','May','June','July','August','September','October','November','December'];
const pad=n=>String(n).padStart(2,'0');
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function eventsFor(ds){
  const base=BASE.filter(e=>e.d===ds&&!hiddenBaseIds.includes(e.id));
  const add=addedEvents.filter(e=>e.d===ds);
  return base.concat(add);
}
function photosFor(ds){return photos.filter(p=>p.d===ds);}

/* ---------- Month range: May 2026 .. May 2027 ---------- */
const RANGE=[];for(let i=0;i<12;i++){const m=5+i;RANGE.push({yr:2026+Math.floor((m-1)/12),mo:((m-1)%12)+1});}
let cur=0;

function buildGrid(){
  const {yr,mo}=RANGE[cur];
  document.getElementById('curLabel').textContent=MN[mo]+' '+yr;
  document.getElementById('monthHeading').textContent=MN[mo]+' '+yr;
  document.getElementById('prevBtn').disabled=cur===0;
  document.getElementById('nextBtn').disabled=cur===RANGE.length-1;
  const g=document.getElementById('grid');g.innerHTML='';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{const h=document.createElement('div');h.className='dow-header';h.textContent=d;g.appendChild(h);});
  const fd=new Date(yr,mo-1,1).getDay(),dm=new Date(yr,mo,0).getDate();
  const n=new Date(),ts=n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate());
  for(let i=0;i<fd;i++){const b=document.createElement('div');b.className='day-cell empty';g.appendChild(b);}
  for(let d=1;d<=dm;d++){
    const ds=yr+'-'+pad(mo)+'-'+pad(d),ev=eventsFor(ds),ph=photosFor(ds),iT=ds===ts;
    const c=document.createElement('div');c.className='day-cell'+(iT?' today-cell':'');c.onclick=()=>openM(ds);
    const num=document.createElement('div');num.className='day-num'+(iT?' today-num':'');num.textContent=d;c.appendChild(num);
    if(ph.length){const f=document.createElement('div');f.className='photo-flag';f.textContent='📷';c.appendChild(f);}
    ev.slice(0,3).forEach(e=>{const ch=document.createElement('span');ch.className='chip cat-'+e.cat;ch.textContent=(e.time?e.time.split('-')[0]+' ':'')+e.t;c.appendChild(ch);});
    if(ev.length>3){const m2=document.createElement('span');m2.className='chip more';m2.textContent='+'+(ev.length-3)+' more';c.appendChild(m2);}
    g.appendChild(c);
  }
}
function navMonth(dir){cur=Math.max(0,Math.min(RANGE.length-1,cur+dir));buildGrid();}
function goToday(){
  const n=new Date(),idx=RANGE.findIndex(r=>r.yr===n.getFullYear()&&r.mo===n.getMonth()+1);
  if(idx>=0){cur=idx;buildGrid();}else{alert('Today is outside this calendar’s range (May 2026 – April 2027).');}
}

let activeDate=null;
function openM(ds){activeDate=ds;renderModal();document.getElementById('overlay').classList.add('open');}
function closeModal(){document.getElementById('overlay').classList.remove('open');}

function renderModal(){
  const ds=activeDate;if(!ds)return;
  const [y,m,d]=ds.split('-').map(Number);
  document.getElementById('modal-title').textContent=MN[m]+' '+d+', '+y;
  const ev=eventsFor(ds),ph=photosFor(ds);
  let html='';
  html+=ev.length?ev.map(e=>{const c=CAT[e.cat]||CAT.personal;return '<div class="ev-card" style="background:'+c.bg+';border-left-color:'+c.b+'"><button class="ev-del" title="Delete" data-evid="'+e.id+'">&times;</button><div class="ev-title" style="color:'+c.txt+'">'+esc(e.t)+'</div><div class="ev-meta">'+(e.time?'Time: '+esc(e.time)+'<br>':'')+(e.loc?'Location: '+esc(e.loc):'')+'</div></div>';}).join(''):'<p class="no-events">No events yet for this day.</p>';
  html+='<div class="sec-label">Add an event</div>';
  html+='<div class="field"><label>Title</label><input id="f-title" placeholder="e.g. Dentist appointment"></div>';
  html+='<div class="row2"><div class="field"><label>Time (optional)</label><input id="f-time" placeholder="e.g. 3-4pm"></div><div class="field"><label>Category</label><select id="f-cat"><option value="work">Work</option><option value="soccer">Soccer</option><option value="school">School</option><option value="travel">Travel</option><option value="personal" selected>Personal</option><option value="holiday">Holiday</option></select></div></div>';
  html+='<div class="field"><label>Location (optional)</label><input id="f-loc" placeholder="e.g. 123 Main St"></div>';
  html+='<button class="btn-primary" id="addEvBtn">+ Add event</button>';
  html+='<div class="sec-label">Photos</div>';
  if(ph.length){
    html+='<div class="photo-grid">'+ph.map(p=>'<div class="photo-thumb"><button class="photo-del" title="Remove" data-pid="'+p.id+'">&times;</button><img src="'+p.src+'" data-light="'+p.id+'"><div class="photo-cap">'+esc(p.cap||'')+'</div></div>').join('')+'</div>';
  }else{html+='<p class="no-events">No photos yet.</p>';}
  html+='<div class="field" style="margin-top:8px"><label>Caption / note (optional — added to the schedule)</label><input id="f-photocap" placeholder="e.g. Game flyer, party invite"></div>';
  html+='<label class="upload-label" for="f-photo">📷 Add a photo to this day</label><input id="f-photo" type="file" accept="image/*" style="display:none">';
  html+='<p class="hint">Add a photo of anything going on (a flyer, invite, schedule screenshot) — everyone with the link sees it. A caption is also added to the day as a note.</p>';
  const body=document.getElementById('modal-body');body.innerHTML=html;
  // wire handlers
  body.querySelectorAll('.ev-del').forEach(b=>b.onclick=()=>delEvent(b.dataset.evid));
  body.querySelectorAll('.photo-del').forEach(b=>b.onclick=()=>delPhoto(b.dataset.pid));
  body.querySelectorAll('img[data-light]').forEach(im=>im.onclick=()=>showLightbox(im.dataset.light));
  document.getElementById('addEvBtn').onclick=addEvent;
  document.getElementById('f-photo').onchange=addPhoto;
}

let db=null,ready=false;
async function addEvent(){
  if(!ready)return alert('Still connecting to the shared database — try again in a moment.');
  const t=document.getElementById('f-title').value.trim();
  if(!t)return alert('Please enter a title.');
  const btn=document.getElementById('addEvBtn');btn.disabled=true;
  try{
    await addDoc(collection(db,'events'),{
      d:activeDate,t,
      time:document.getElementById('f-time').value.trim(),
      loc:document.getElementById('f-loc').value.trim(),
      cat:document.getElementById('f-cat').value,
      ts:Date.now()
    });
  }catch(e){alert('Could not save: '+e.message);}
  btn.disabled=false;
}
async function delEvent(id){
  if(!ready)return;
  if(!confirm('Delete this event for everyone?'))return;
  try{
    if(String(id).startsWith('base-')){await setDoc(doc(db,'hidden',id),{hidden:true});}
    else{await deleteDoc(doc(db,'events',id));}
  }catch(e){alert('Could not delete: '+e.message);}
}
function addPhoto(evt){
  if(!ready)return alert('Still connecting — try again in a moment.');
  const file=evt.target.files[0];if(!file)return;
  const cap=document.getElementById('f-photocap').value.trim(),forDate=activeDate;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=async function(){
      const max=700;let{width:w,height:h}=img;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.6,data=cv.toDataURL('image/jpeg',q);
      while(data.length>900000&&q>0.3){q-=0.1;data=cv.toDataURL('image/jpeg',q);}
      if(data.length>1000000)return alert('That photo is too large to store. Try a smaller image.');
      try{
        const ref=await addDoc(collection(db,'photos'),{d:forDate,src:data,cap,ts:Date.now()});
        if(cap){await addDoc(collection(db,'events'),{d:forDate,t:'📷 '+cap,time:'',loc:'',cat:'personal',photoId:ref.id,ts:Date.now()});}
      }catch(err){alert('Could not upload photo: '+err.message);}
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
async function delPhoto(id){
  if(!ready)return;
  try{
    await deleteDoc(doc(db,'photos',id));
    // also remove the linked note event, if present
    const linked=addedEvents.find(e=>e.photoId===id);
    if(linked)await deleteDoc(doc(db,'events',linked.id));
  }catch(e){alert('Could not remove photo: '+e.message);}
}
function showLightbox(id){
  const p=photos.find(x=>x.id===id);
  if(p){document.getElementById('lightbox-img').src=p.src;document.getElementById('lightbox').classList.add('open');}
}

/* ---------- Static UI wiring (works even before DB connects) ---------- */
document.getElementById('prevBtn').onclick=()=>navMonth(-1);
document.getElementById('nextBtn').onclick=()=>navMonth(1);
document.getElementById('todayBtn').onclick=goToday;
document.getElementById('modalClose').onclick=closeModal;
document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeModal();};
document.getElementById('modalBox').onclick=e=>e.stopPropagation();
document.getElementById('lightbox').onclick=function(){this.classList.remove('open');};

// show current month immediately
(function(){const n=new Date(),idx=RANGE.findIndex(r=>r.yr===n.getFullYear()&&r.mo===n.getMonth()+1);cur=idx>=0?idx:0;buildGrid();})();

/* ---------- Connect to Firestore ---------- */
const badge=document.getElementById('syncBadge');
function setBadge(text,cls){badge.textContent=text;badge.className='sync-badge'+(cls?' '+cls:'');}

if(firebaseConfig.apiKey.startsWith('PASTE_')){
  setBadge('Not connected','err');
  const w=document.getElementById('setupWarn');w.style.display='block';
  w.innerHTML='⚠️ <b>Firebase not set up yet.</b> The calendar shows but edits won’t be shared. Open this file and paste your Firebase config into the <code>firebaseConfig</code> block near the top of the script, then re-upload to GitHub.';
}else{
  try{
    const app=initializeApp(firebaseConfig);
    db=getFirestore(app);
    setBadge('Connecting…');
    let loaded=0;const need=3;
    const mark=()=>{loaded++;if(loaded>=need){ready=true;setBadge('Synced ✓','ok');}};
    let f1=false,f2=false,f3=false;
    onSnapshot(collection(db,'events'),snap=>{
      addedEvents=snap.docs.map(d=>({id:d.id,...d.data()}));
      buildGrid();if(document.getElementById('overlay').classList.contains('open'))renderModal();
      if(!f1){f1=true;mark();}
    },err=>{setBadge('Sync error','err');console.error(err);});
    onSnapshot(collection(db,'hidden'),snap=>{
      hiddenBaseIds=snap.docs.map(d=>d.id);
      buildGrid();if(document.getElementById('overlay').classList.contains('open'))renderModal();
      if(!f2){f2=true;mark();}
    },err=>{console.error(err);});
    onSnapshot(collection(db,'photos'),snap=>{
      photos=snap.docs.map(d=>({id:d.id,...d.data()}));
      buildGrid();if(document.getElementById('overlay').classList.contains('open'))renderModal();
      if(!f3){f3=true;mark();}
    },err=>{console.error(err);});
    ready=true; // allow writes as soon as app initializes
  }catch(e){
    setBadge('Connection failed','err');
    const w=document.getElementById('setupWarn');w.style.display='block';
    w.innerHTML='⚠️ Could not connect to Firebase: '+esc(e.message)+'. Double-check your config values.';
  }
}
