const byDate={};E.forEach(e=>{(byDate[e.d]=byDate[e.d]||[]).push(e);});
const CAT={work:{bg:'#d2e3fc',txt:'#1a3d8f',b:'#1565c0'},soccer:{bg:'#d4edda',txt:'#1a5c34',b:'#28a745'},school:{bg:'#fff3cd',txt:'#856404',b:'#ffc107'},travel:{bg:'#fce8d5',txt:'#8b3a0f',b:'#fd7e14'},personal:{bg:'#ede0f9',txt:'#5a1a8a',b:'#9c27b0'},holiday:{bg:'#fde8e8',txt:'#991b1b',b:'#dc3545'}};
function pad(n){return String(n).padStart(2,'0')}
function buildGrid(yr,mo,id){
const g=document.getElementById(id);g.innerHTML='';
['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{const h=document.createElement('div');h.className='dow-header';h.textContent=d;g.appendChild(h);});
const fd=new Date(yr,mo-1,1).getDay(),dm=new Date(yr,mo,0).getDate();
const n=new Date(),ts=n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate());
for(let i=0;i<fd;i++){const b=document.createElement('div');b.className='day-cell empty';g.appendChild(b);}
for(let d=1;d<=dm;d++){
const ds=yr+'-'+pad(mo)+'-'+pad(d),ev=byDate[ds]||[],iT=ds===ts;
const c=document.createElement('div');c.className='day-cell'+(iT?' today-cell':'');c.onclick=()=>openM(ds,d,mo,yr);
const n=document.createElement('div');n.className='day-num'+(iT?' today-num':'');n.textContent=d;c.appendChild(n);
ev.slice(0,3).forEach(e=>{const ch=document.createElement('span');ch.className='chip cat-'+e.cat;ch.textContent=(e.time?e.time.split('-')[0]+' ':'')+e.t;c.appendChild(ch);});
if(ev.length>3){const m=document.createElement('span');m.className='chip more';m.textContent='+'+(ev.length-3)+' more';c.appendChild(m);}
g.appendChild(c);
}}
const MN=['','January','February','March','April','May','June','July','August','September','October','November','December'];
function openM(ds,d,mo,yr){
const ev=byDate[ds]||[];
document.getElementById('modal-title').textContent=MN[mo]+' '+d+', '+yr;
const b=document.getElementById('modal-body');
b.innerHTML=ev.length?ev.map(e=>{const c=CAT[e.cat]||CAT.personal;return '<div class="ev-card" style="background:'+c.bg+';border-left-color:'+c.b+'"><div class="ev-title" style="color:'+c.txt+'">'+e.t+'</div><div class="ev-meta">'+(e.time?'Time: '+e.time+'<br>':'')+(e.loc?'Location: '+e.loc:'')+'</div></div>';}).join(''):'<p class="no-events">No events.</p>';
document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function maybeClose(e){if(e.target.id==='overlay')closeModal();}
function showMonth(m){['may','june'].forEach(id=>{document.getElementById('wrap-'+id).classList.toggle('visible',id===m);document.getElementById('btn-'+id).classList.toggle('active',id===m);});}
